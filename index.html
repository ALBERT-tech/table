<!DOCTYPE html>
<html>
<head>
    <title>Docling Table Extractor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h1>Извлечение таблиц из документа</h1>
        <p>Поддерживаются: PDF, DOCX, PPTX, XLSX, Images и др.</p>

        <form id="uploadForm" enctype="multipart/form-data">
            <div class="mb-3">
                <label for="file" class="form-label">Выберите файл</label>
                <input class="form-control" type="file" name="file" id="file" required>
            </div>
            <button type="submit" class="btn btn-primary">Загрузить и извлечь таблицы</button>
        </form>

        <div id="result" class="mt-4"></div>
    </div>

    <script>
        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('file', document.getElementById('file').files[0]);

            document.getElementById('result').innerHTML = '<div class="alert alert-info">Обработка...</div>';

            try {
                const response = await fetch('https://table-h08i.onrender.com/upload', {
                    method: 'POST',
                    body: formData
                });
                const html = await response.text();
                document.getElementById('result').innerHTML = html;
            } catch (error) {
                document.getElementById('result').innerHTML = '<div class="alert alert-danger">Ошибка соединения с сервером.</div>';
            }
        };
    </script>
</body>
</html>
